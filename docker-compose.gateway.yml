services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: codex-gateway:local
    restart: unless-stopped
    ports:
      - "${CODEX_GATEWAY_PORT:-8080}:8080"
    environment:
      CODEX_GATEWAY_LISTEN: 0.0.0.0:8080
      CODEX_GATEWAY_RUNTIME: ${CODEX_GATEWAY_RUNTIME:-embedded}
      CODEX_GATEWAY_SESSION_SOURCE: ${CODEX_GATEWAY_SESSION_SOURCE:-gateway}
      CODEX_GATEWAY_CLIENT_NAME: ${CODEX_GATEWAY_CLIENT_NAME:-}
      CODEX_GATEWAY_CLIENT_VERSION: ${CODEX_GATEWAY_CLIENT_VERSION:-}
      CODEX_GATEWAY_EXEC_SERVER_URL: ${CODEX_GATEWAY_EXEC_SERVER_URL:-}
      CODEX_GATEWAY_BEARER_TOKEN: ${CODEX_GATEWAY_BEARER_TOKEN:-}
      CODEX_GATEWAY_NO_AUDIT_LOGS: ${CODEX_GATEWAY_NO_AUDIT_LOGS:-}
      CODEX_GATEWAY_REQUESTS_PER_MINUTE: ${CODEX_GATEWAY_REQUESTS_PER_MINUTE:-}
      CODEX_GATEWAY_TURN_STARTS_PER_MINUTE: ${CODEX_GATEWAY_TURN_STARTS_PER_MINUTE:-}
      CODEX_GATEWAY_V2_INITIALIZE_TIMEOUT_SECONDS: ${CODEX_GATEWAY_V2_INITIALIZE_TIMEOUT_SECONDS:-}
      CODEX_GATEWAY_V2_CLIENT_SEND_TIMEOUT_SECONDS: ${CODEX_GATEWAY_V2_CLIENT_SEND_TIMEOUT_SECONDS:-}
      CODEX_GATEWAY_V2_RECONNECT_RETRY_BACKOFF_SECONDS: ${CODEX_GATEWAY_V2_RECONNECT_RETRY_BACKOFF_SECONDS:-}
      CODEX_GATEWAY_V2_MAX_PENDING_SERVER_REQUESTS: ${CODEX_GATEWAY_V2_MAX_PENDING_SERVER_REQUESTS:-}
      CODEX_GATEWAY_V2_MAX_PENDING_CLIENT_REQUESTS: ${CODEX_GATEWAY_V2_MAX_PENDING_CLIENT_REQUESTS:-}
      CODEX_GATEWAY_REMOTE_AUTH_TOKEN: ${CODEX_GATEWAY_REMOTE_AUTH_TOKEN:-codex-local-worker-token}
      CODEX_GATEWAY_REMOTE_WEBSOCKET_URLS: ${CODEX_GATEWAY_REMOTE_WEBSOCKET_URLS:-}
      CODEX_GATEWAY_REMOTE_ACCOUNT_IDS: ${CODEX_GATEWAY_REMOTE_ACCOUNT_IDS:-}
  app-server:
    profiles:
      - remote
    build:
      context: .
      dockerfile: Dockerfile.app-server
    image: codex-app-server:local
    restart: unless-stopped
    network_mode: "service:gateway"
    depends_on:
      gateway:
        condition: service_started
    environment:
      CODEX_APP_SERVER_WS_TOKEN: ${CODEX_GATEWAY_REMOTE_AUTH_TOKEN:-codex-local-worker-token}
      CODEX_APP_SERVER_LISTEN: ${CODEX_APP_SERVER_LISTEN:-ws://0.0.0.0:9001}
